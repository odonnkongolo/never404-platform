apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: market-ingress
  namespace: default
  annotations:
    kubernetes.io/ingress.class: "traefik"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  tls:
  - hosts:
    - never404.co.uk
    secretName: never404-tls
  rules:
  - host: never404.co.uk
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: market-frontend-service
            port:
              number: 80