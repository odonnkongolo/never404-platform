name: Build and Deploy Platform

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}-app

jobs:
  # =========================================================
  # PROCESS 1: CONTINUOUS INTEGRATION (The Code Gatekeepers)
  # =========================================================
  code-quality-checks:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 🚨 Run Ruff (Code Quality & Syntax)
        run: |
          pip install ruff
          ruff check ./app

      - name: 🔒 Run Bandit (Security Vulnerability Scanner)
        run: |
          pip install bandit
          bandit -r ./app -lll

  # =========================================================
  # PROCESS 2: CONTINUOUS DEPLOYMENT (The AWS Rollout)
  # =========================================================
  deploy-infrastructure:
    needs: code-quality-checks  # <--- THIS IS THE UNBREAKABLE LOCK
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🐳 Log in to the Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.CR_PAT }}

      - name: 🔨 Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./app
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

      - name: 🔐 Setup Kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.NEVER404_KUBECONFIG }}" > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: 🔑 Inject Image Pull Secret
        run: |
          kubectl create secret docker-registry ghcr-secret \
            --docker-server=ghcr.io \
            --docker-username=${{ github.actor }} \
            --docker-password=${{ secrets.CR_PAT }} \
            --dry-run=client -o yaml | kubectl apply -f - --validate=false

      - name: 🚀 Apply Kubernetes Manifests
        run: |
          kubectl apply -f ./env-kubernetes/issuer.yaml --validate=false
          kubectl apply -f ./env-kubernetes/app-prod.yaml --validate=false
          kubectl apply -f ./env-kubernetes/ingress.yaml --validate=false
          kubectl apply -f ./env-kubernetes/ingress-grafana.yaml --validate=false