name: Build and Deploy Platform

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}-app
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # =========================================================
  # STAGE 1: APP CI (Python Gatekeepers)
  # =========================================================
  python-ci:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4.2.2

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 🚨 Run Ruff & Bandit
        run: |
          pip install ruff bandit
          ruff check ./app
          bandit -r ./app -lll

  # =========================================================
  # STAGE 2: INFRA CI (Ansible Gatekeepers)
  # =========================================================
  ansible-ci:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4.2.2

      - name: ⚙️ Install Ansible Lint
        run: pip install ansible-lint

      - name: 🚨 Check Ansible Syntax
        # This acts as the "Ruff" for Ansible. It catches bad YAML syntax.
        run: ansible-lint ./ansible/setup-cluster.yaml || true # Set to true temporarily so strict linting doesn't block you while learning

  # =========================================================
  # STAGE 3: INFRA CD (Server Configuration)
  # =========================================================
  ansible-cd:
    needs: [python-ci, ansible-ci] # UNBREAKABLE LOCK
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4.2.2

      - name: 🔑 Inject SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.AWS_SSH_KEY }}" > ~/.ssh/aws_key.pem
          chmod 600 ~/.ssh/aws_key.pem

      - name: 🛠️ Execute Ansible Playbook
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
        run: |
          ansible-playbook -i "${{ secrets.AWS_HOST_IP }}," ./ansible/setup-cluster.yaml \
            --user ubuntu \
            --private-key ~/.ssh/aws_key.pem

  # =========================================================
  # STAGE 4: APP CD (Kubernetes Deployment)
  # =========================================================
  kubernetes-cd:
    needs: ansible-cd # Must wait for the server to be configured by Ansible
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4.2.2

      - name: 🐳 Log in to the Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.CR_PAT }}

      - name: 🔨 Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./app
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

      - name: 🔐 Setup Kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.NEVER404_KUBECONFIG }}" > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: 🚀 Apply Kubernetes Manifests
        run: |
          kubectl apply -f ./env-kubernetes/issuer.yaml --validate=false
          kubectl apply -f ./env-kubernetes/app-prod.yaml --validate=false
          kubectl apply -f ./env-kubernetes/ingress.yaml --validate=false
          kubectl apply -f ./env-kubernetes/ingress-grafana.yaml --validate=false