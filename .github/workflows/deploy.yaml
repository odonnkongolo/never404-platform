# Last deployed: 2026-06-05 - Triggering deployment with regenerated TLS certificates
name: "Never404 GitOps Deployment"

on:
  push:
    branches: [ "main" ]
    paths:
      - 'env-kubernetes/**'
      - '.github/workflows/**'

jobs:
  deploy-to-k3s:
    name: "Deploy Kubernetes Manifests"
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🔐 Setup Kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.NEVER404_KUBECONFIG }}" > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: 🛡️ Install Cert-Manager
        run: |
          kubectl apply -f https://github.com/cert-manager/cert-manager/releases/download/v1.14.5/cert-manager.yaml --validate=false
          # Wait for cert-manager pods to be fully ready (not just started)
          kubectl rollout status deployment/cert-manager -n cert-manager --timeout=120s
          kubectl rollout status deployment/cert-manager-webhook -n cert-manager --timeout=120s
          kubectl rollout status deployment/cert-manager-cainjector -n cert-manager --timeout=120s

      - name: 🚀 Apply Kubernetes Manifests
        run: |
          kubectl apply -f ./env-kubernetes/issuer.yaml --validate=false
          kubectl apply -f ./env-kubernetes/app-test.yaml --validate=false
          kubectl apply -f ./env-kubernetes/ingress.yaml --validate=false