name: Build and Deploy Platform

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}-app
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # =========================================================
  # STAGE 1: APP CI (Python Gatekeepers)
  # =========================================================
  python-ci:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v5

      - name: 🐍 Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: 🚨 Run Ruff & Bandit
        run: |
          pip install ruff bandit
          ruff check ./app
          bandit -r ./app -lll

  # =========================================================
  # STAGE 2: INFRA CI (Ansible Gatekeepers)
  # =========================================================
  ansible-ci:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v5

      - name: ⚙️ Install Ansible Lint
        run: pip install ansible-lint

      - name: 🚨 Check Ansible Syntax
        run: ansible-lint ./ansible/setup-cluster.yaml

  # =========================================================
  # STAGE 3: INFRA CD (Server Configuration)
  # =========================================================
  ansible-cd:
    needs: [python-ci, ansible-ci] # UNBREAKABLE LOCK
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v5

      - name: 🔑 Inject SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.AWS_SSH_KEY }}" > ~/.ssh/aws_key.pem
          chmod 600 ~/.ssh/aws_key.pem

      - name: 🛠️ Execute Ansible Playbook
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
        run: |
          ansible-playbook -i "${{ secrets.AWS_HOST_IP }}," ./ansible/setup-cluster.yaml \
            --user ubuntu \
            --private-key ~/.ssh/aws_key.pem

  # =========================================================
  # STAGE 4: APP CD (Kubernetes Deployment)
  # =========================================================
  kubernetes-cd:
    needs: ansible-cd # Must wait for the server to be configured by Ansible
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v5

      - name: 🐳 Log in to the Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.CR_PAT }}

      - name: 🔨 Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./app
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

      - name: 🔐 Setup Kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.NEVER404_KUBECONFIG }}" > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: 🔑 Inject Image Pull Secret
        run: |
          kubectl create secret docker-registry ghcr-secret \
            --docker-server=ghcr.io \
            --docker-username=${{ github.actor }} \
            --docker-password=${{ secrets.CR_PAT }} \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: 🛡️ Install Cert-Manager CRDs
        run: |
          # Install Cert-Manager and all its CRDs from the official source
          kubectl apply -f https://github.com/cert-manager/cert-manager/releases/download/v1.14.4/cert-manager.yaml
          # Block until the webhook is fully online — prevents the "ClusterIssuer not found" race condition
          kubectl wait --for=condition=Available deployment/cert-manager-webhook -n cert-manager --timeout=120s
          # Small buffer to ensure the webhook is fully registered with the API server
          sleep 10

      - name: 🚀 Apply Kubernetes Manifests
        run: |
          kubectl apply -f ./env-kubernetes/issuer.yaml --validate=false
          kubectl apply -f ./env-kubernetes/app-prod.yaml --validate=false
          kubectl apply -f ./env-kubernetes/ingress.yaml --validate=false
          kubectl create namespace monitoring --dry-run=client -o yaml | kubectl apply -f -
          kubectl apply -f ./env-kubernetes/ingress-grafana.yaml --validate=false