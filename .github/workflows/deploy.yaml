name: Build and Deploy Platform

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}-app

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🐳 Log in to the Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.CR_PAT }}

      - name: 🔨 Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./app
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

      - name: 🔐 Setup Kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.NEVER404_KUBECONFIG }}" > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: 🔑 Inject Image Pull Secret
        run: |
          kubectl create secret docker-registry ghcr-secret \
            --docker-server=ghcr.io \
            --docker-username=${{ github.actor }} \
            --docker-password=${{ secrets.CR_PAT }} \
            --dry-run=client -o yaml | kubectl apply -f - --validate=false

      - name: 🛡️ Verify Cert-Manager
        run: |
          kubectl apply -f https://github.com/cert-manager/cert-manager/releases/download/v1.14.5/cert-manager.yaml --validate=false
          kubectl rollout status -n cert-manager deploy/cert-manager-webhook --timeout=90s

      - name: 🚀 Apply Kubernetes Manifests
        run: |
          kubectl apply -f ./env-kubernetes/issuer.yaml --validate=false
          kubectl apply -f ./env-kubernetes/app-prod.yaml --validate=false
          kubectl apply -f ./env-kubernetes/ingress.yaml --validate=false