---
- name: Provision never404.co.uk K3s Cluster
  hosts: aws_servers
  become: true

  tasks:
    # --- 1. The Bulletproof Swap Allocation ---
    - name: Physically allocate 2GB for the swap file
      ansible.builtin.command: dd if=/dev/zero of=/swapfile bs=1M count=2048
      args:
        creates: /swapfile
      changed_when: false

    - name: Set correct permissions on the swap file
      ansible.builtin.file:
        path: /swapfile
        mode: '0600'

    - name: Format the swap file
      ansible.builtin.command: mkswap /swapfile
      when: ansible_facts['swaptotal_mb'] == 0
      changed_when: false

    - name: Enable the swap file
      ansible.builtin.command: swapon /swapfile
      when: ansible_facts['swaptotal_mb'] == 0
      changed_when: false

    - name: Make swap permanent in /etc/fstab
      ansible.builtin.lineinfile:
        path: /etc/fstab
        line: '/swapfile none swap sw 0 0'
        state: present

    # --- 2. The MTU Network SRE Hotfix (Idempotent) ---
    - name: Check if FORWARD MTU rule exists
      ansible.builtin.command: iptables -t mangle -C FORWARD -p tcp --tcp-flags SYN,RST SYN -j TCPMSS --clamp-mss-to-pmtu
      register: forward_mtu_check
      failed_when: false
      changed_when: false

    - name: Fix MTU Packet Fragmentation (FORWARD)
      ansible.builtin.command: iptables -t mangle -A FORWARD -p tcp --tcp-flags SYN,RST SYN -j TCPMSS --clamp-mss-to-pmtu
      when: forward_mtu_check.rc != 0
      changed_when: forward_mtu_check.rc != 0

    - name: Check if OUTPUT MTU rule exists
      ansible.builtin.command: iptables -t mangle -C OUTPUT -p tcp --tcp-flags SYN,RST SYN -j TCPMSS --clamp-mss-to-pmtu
      register: output_mtu_check
      failed_when: false
      changed_when: false

    - name: Fix MTU Packet Fragmentation (OUTPUT)
      ansible.builtin.command: iptables -t mangle -A OUTPUT -p tcp --tcp-flags SYN,RST SYN -j TCPMSS --clamp-mss-to-pmtu
      when: output_mtu_check.rc != 0
      changed_when: output_mtu_check.rc != 0

    # --- 3. K3s Security Configuration ---
    - name: Create K3s config directory
      ansible.builtin.file:
        path: /etc/rancher/k3s
        state: directory
        mode: '0755'

    - name: Add Public IP to K3s TLS SAN
      ansible.builtin.copy:
        dest: /etc/rancher/k3s/config.yaml
        content: |
          tls-san:
            - "{{ inventory_hostname }}"
        mode: '0644'

    # --- 4. The Kubernetes Orchestrator ---
    - name: Download K3s install script
      ansible.builtin.get_url:
        url: https://get.k3s.io
        dest: /tmp/k3s-install.sh
        mode: '0755'

    - name: Install K3s
      ansible.builtin.command: /tmp/k3s-install.sh
      args:
        creates: /usr/local/bin/k3s
      changed_when: false
